services:
  app:
    build: .
    ports:
      - "8001:8001"
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY}
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - API_KEY=${API_KEY}
      - COLLECTION_NAME=${COLLECTION_NAME:-rag_collection}
    command: uvicorn app.main:app --host 0.0.0.0 --port 8001 --loop asyncio
    depends_on:
      - qdrant
      - mlflow
      - prometheus
    volumes:
      - ./app:/app/app
      - ./scripts:/app/scripts
    networks:
      - rag-network
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.15.4
    ports:
      - "6333:6333"
    volumes:
      - qdrant_storage:/qdrant/storage
    networks:
      - rag-network
    restart: unless-stopped

  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.10.0
    ports:
      - "5000:5000"
    command: ["mlflow", "server", "--host", "0.0.0.0", "--port", "5000", "--backend-store-uri", "sqlite:///mlflow.db", "--artifacts-destination", "/mlflow/artifacts"]
    environment:
      - MLFLOW_TRACKING_URI=http://mlflow:5000
    volumes:
      - mlflow_artifacts:/mlflow/artifacts
    networks:
      - rag-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:v3.11.3
    container_name: prometheus
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
    networks:
      - rag-network
    restart: unless-stopped

  grafana:
    image: grafana/grafana:13.0.1
    container_name: grafana
    ports:
      - "3000:3000"
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      - GF_SECURITY_ADMIN_PASSWORD=admin
    volumes:
      - ./grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    depends_on:
      - prometheus
    networks:
      - rag-network
    restart: unless-stopped

volumes:
  qdrant_storage:
  mlflow_artifacts:

networks:
  rag-network:
    driver: bridge
