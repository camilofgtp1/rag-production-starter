stages:
  - lint
  - test
  - build
  - deploy

variables:
  PIP_CACHE_DIR: "$CI_PROJECT_DIR/.cache/pip"
  IMAGE_TAG: $CI_REGISTRY_IMAGE:$CI_COMMIT_SHA

cache:
  paths:
    - .cache/pip

default:
  image: python:3.11-slim
  before_script:
    - pip install -e ".[dev]" --quiet

lint:
  stage: lint
  script:
    - pip install ruff --quiet
    - ruff check app/ tests/
  allow_failure: true

test:
  stage: test
  services:
    - name: qdrant/qdrant
      alias: qdrant
  variables:
    QDRANT_URL: "http://qdrant:6333"
    OPENAI_API_KEY: "test-key-not-real"
    COLLECTION_NAME: "test_collection"
    MLFLOW_TRACKING_URI: "http://localhost:5000"
    API_KEY: "test-key"
  script:
    - pytest tests/ -v --tb=short
  coverage: '/TOTAL.*\s+(\d+%)$/'

build:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2376
    DOCKER_TLS_CERT_DIR: "/etc/docker/certs.d"
    DOCKER_TLS_VERIFY: 1
    DOCKER_CERT_PATH: "$DOCKER_TLS_CERT_DIR/ca.pem"
    DOCKER_KEY_PATH: "$DOCKER_TLS_CERT_DIR/key.pem"
    DOCKER_CA_CERT_PATH: "$DOCKER_TLS_CERT_DIR/ca.pem"
  script:
    - docker login -u $CI_REGISTRY_USER -p $CI_REGISTRY_PASSWORD $CI_REGISTRY
    - docker build -t $IMAGE_TAG .
    - docker push $IMAGE_TAG
  needs:
    - job: test
      artifacts: false